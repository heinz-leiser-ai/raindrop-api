name: Keep Supabase Alive

on:
  schedule:
    # Taeglich 9:00 UTC — Supabase Free-Tier braucht regelmaessige DB-Aktivitaet
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing secrets: SUPABASE_URL and SUPABASE_ANON_KEY must be set in GitHub."
            exit 1
          fi

          if echo "$SUPABASE_URL" | grep -qE '^postgres(ql)?://'; then
            echo "SUPABASE_URL must be the HTTPS API URL (https://xxx.supabase.co), not a postgres connection string."
            exit 1
          fi

          BASE="${SUPABASE_URL%/}"

          ping_endpoint() {
            local name="$1"
            local url="$2"
            shift 2

            echo "Pinging ${name}..."
            HTTP=$(curl -s -o /tmp/supabase-response.txt -w "%{http_code}" "$url" "$@")
            echo "HTTP status: ${HTTP}"
            cat /tmp/supabase-response.txt || true

            if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
              echo "${name}: OK"
              return 0
            fi

            echo "${name}: FAILED"
            return 1
          }

          FAILED=0

          ping_endpoint "Auth health" "${BASE}/auth/v1/health" \
            -H "apikey: ${SUPABASE_ANON_KEY}" || FAILED=1

          ping_endpoint "Database (keep_alive)" "${BASE}/rest/v1/keep_alive?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" || FAILED=1

          ping_endpoint "Edge Function (health)" "${BASE}/functions/v1/api/health" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" || FAILED=1

          if [ "$FAILED" -eq 0 ]; then
            echo "Supabase keep-alive ping successful."
            exit 0
          fi

          echo "One or more pings failed — check SUPABASE_URL and SUPABASE_ANON_KEY in GitHub Secrets."
          exit 1
