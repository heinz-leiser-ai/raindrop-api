name: Keep Supabase Alive

on:
  schedule:
    # Mo + Do, 9:00 UTC — Free-Tier pausiert nach 7 Tagen Inaktivität
    - cron: '0 9 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing secrets: SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY must be set in GitHub."
            exit 1
          fi

          if echo "$SUPABASE_URL" | grep -qE '^postgres(ql)?://'; then
            echo "SUPABASE_URL must be the HTTPS API URL (https://xxx.supabase.co), not a postgres connection string."
            exit 1
          fi

          BASE="${SUPABASE_URL%/}"

          echo "Pinging REST API (profiles)..."
          HTTP=$(curl -s -o /tmp/supabase-response.txt -w "%{http_code}" \
            "${BASE}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")

          echo "HTTP status: ${HTTP}"
          cat /tmp/supabase-response.txt || true

          if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
            echo "Supabase keep-alive ping successful."
            exit 0
          fi

          if [ "$HTTP" = "401" ] || [ "$HTTP" = "403" ]; then
            echo "Auth failed — check SUPABASE_SERVICE_ROLE_KEY in GitHub Secrets."
          fi

          exit 1
