project_id = "raindrop-self-hosted"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
port = 54323

[functions.api]
verify_jwt = false

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
# Access-Token-Lebensdauer (Sekunden). RDBE-12: Frontend nutzt refresh_token + POST auth/refresh bei Ablauf.
jwt_expiry = 3600
enable_signup = false
# Refresh-Token-Rotation und maximale Refresh-Lebensdauer: in Self-Hosted/Cloud unter Authentication > Settings,
# ggf. [auth] in produktiver config.toml (GoTrue-ENV) setzen — siehe Supabase-Doku zu refresh_token.

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"

[auth.external.apple]
enabled = true
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_CLIENT_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"
